name: ingestion-cron

on:
  workflow_dispatch:
    inputs:
      min_publication_date:
        description: "Optional min publication date (YYYY-MM-DD)"
        required: false
        default: "2025-01-01"
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

concurrency:
  group: ingestion-cron
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: src
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CIDO_PAGE_LIMIT: ${{ vars.CIDO_PAGE_LIMIT || '100' }}
      CIDO_MAX_PAGES: ${{ vars.CIDO_MAX_PAGES || '0' }}
      CIDO_FILTER_PUBLICATION_FROM: ${{ github.event.inputs.min_publication_date || vars.CIDO_FILTER_PUBLICATION_FROM || '2025-01-01' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run ingestion
        run: python scripts/run_ingestion.py
