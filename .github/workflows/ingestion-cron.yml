name: ingestion-cron

on:
  workflow_dispatch:
    inputs:
      min_publication_date:
        description: "Optional min publication date (YYYY-MM-DD)"
        required: false
        default: "2025-01-01"
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

concurrency:
  group: ingestion-cron
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: src
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CIDO_PAGE_LIMIT: ${{ vars.CIDO_PAGE_LIMIT }}
      CIDO_MAX_PAGES: ${{ vars.CIDO_MAX_PAGES }}
      CIDO_FILTER_PUBLICATION_FROM: ${{ github.event.inputs.min_publication_date }}
      CIDO_FILTER_PUBLICATION_FROM_DEFAULT: ${{ vars.CIDO_FILTER_PUBLICATION_FROM }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run ingestion
        id: ingest
        continue-on-error: true
        run: |
          export CIDO_PAGE_LIMIT="${CIDO_PAGE_LIMIT:-100}"
          export CIDO_MAX_PAGES="${CIDO_MAX_PAGES:-0}"
          export CIDO_FILTER_PUBLICATION_FROM="${CIDO_FILTER_PUBLICATION_FROM:-$CIDO_FILTER_PUBLICATION_FROM_DEFAULT}"
          export CIDO_FILTER_PUBLICATION_FROM="${CIDO_FILTER_PUBLICATION_FROM:-2025-01-01}"
          python scripts/run_ingestion.py

      - name: Build ingestion summary
        id: summary
        if: always()
        run: |
          python scripts/build_ingestion_summary.py > ingestion_summary.txt
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          cat ingestion_summary.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send summary email
        if: always() && env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.MAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT || '587' }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "[public-jobs-tracker] Daily ingestion ${{ steps.ingest.outcome }}"
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_FROM || env.SMTP_USERNAME }}
          secure: false
          body: |
            Workflow status: ${{ steps.ingest.outcome }}

            ${{ steps.summary.outputs.summary }}

      - name: Mark workflow failed if ingestion failed
        if: steps.ingest.outcome != 'success'
        run: |
          echo "Ingestion step failed"
          exit 1
