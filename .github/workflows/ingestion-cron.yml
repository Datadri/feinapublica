name: ingestion-cron

on:
  workflow_dispatch:
    inputs:
      min_publication_date:
        description: "Optional min publication date (YYYY-MM-DD)"
        required: false
        default: "2025-01-01"
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

concurrency:
  group: ingestion-cron
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONPATH: src
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CIDO_PAGE_LIMIT: ${{ vars.CIDO_PAGE_LIMIT || '100' }}
      CIDO_MAX_PAGES: ${{ vars.CIDO_MAX_PAGES || '0' }}
      CIDO_FILTER_PUBLICATION_FROM: ${{ github.event.inputs.min_publication_date || vars.CIDO_FILTER_PUBLICATION_FROM || '2025-01-01' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run ingestion
        id: ingest
        continue-on-error: true
        run: python scripts/run_ingestion.py

      - name: Build ingestion summary
        id: summary
        if: always()
        run: |
          python scripts/build_ingestion_summary.py > ingestion_summary.txt
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          cat ingestion_summary.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send summary email
        if: always() && secrets.SMTP_SERVER != '' && secrets.SMTP_USERNAME != '' && secrets.SMTP_PASSWORD != '' && secrets.MAIL_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[public-jobs-tracker] Daily ingestion ${{ steps.ingest.outcome }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM || secrets.SMTP_USERNAME }}
          secure: false
          body: |
            Workflow status: ${{ steps.ingest.outcome }}

            ${{ steps.summary.outputs.summary }}

      - name: Mark workflow failed if ingestion failed
        if: steps.ingest.outcome != 'success'
        run: |
          echo "Ingestion step failed"
          exit 1
